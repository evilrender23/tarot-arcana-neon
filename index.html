<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, height=282, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tarot Arcana Neón - Sí o No</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body tabindex="0">
  <div id="app" class="r1-container neon-theme" tabindex="0">
    <!-- Header -->
    <header class="header">
      <div class="title-group">
        <span class="chip-icon">🃏</span>
        <h1>TAROT ARCANA</h1>
      </div>
      <span class="badge mult-badge">NEÓN x3</span>
    </header>

    <!-- Main Content Area -->
    <main class="content">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-pill red">
          <small>PUNTOS</small>
          <span id="score-val">0</span>
        </div>
        <div class="stat-pill blue">
          <small>SÍ / NO</small>
          <span id="ratio-val">0 / 0</span>
        </div>
      </div>

      <!-- Deck & Tarot Card Stage -->
      <div id="card-stage" class="card-stage">
        <div class="deck-shadow deck-left"></div>
        <div class="deck-shadow deck-right"></div>

        <div id="tarot-card" class="tarot-card face-down" tabindex="0">
          <!-- Card Back -->
          <div class="card-face card-back">
            <div class="neon-pattern"></div>
            <div class="card-center-seal">
              <span class="eye-symbol">👁️</span>
              <small>HAZ TU PREGUNTA</small>
            </div>
          </div>

          <!-- Card Front -->
          <div class="card-face card-front">
            <img id="card-img" class="card-art" src="card_0.jpg" alt="Carta de Tarot">
            <div class="card-overlay">
              <span id="result-badge" class="result-badge yes">SÍ</span>
              <span id="card-name" class="card-name">0. EL LOCO</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Prompt Box -->
      <div class="prompt-box">
        <span id="prompt-text" class="prompt-text">Pulsa PTT o Clic para Tirar</span>
      </div>

      <!-- Direct Touch & Hardware Control Bar -->
      <div class="control-bar">
        <button id="btn-shuffle" class="ctrl-btn">▲ Barajar</button>
        <button id="btn-draw" class="ctrl-btn main-btn">🃏 Tirar</button>
        <button id="btn-oracle" class="ctrl-btn">🎙️ IA</button>
      </div>

      <!-- Persistent LLM Interpretation Modal -->
      <div id="llm-box" class="llm-box hidden">
        <div class="llm-header">
          <span id="llm-title">🔮 Oráculo Arcana IA</span>
          <button id="close-llm" class="close-btn">×</button>
        </div>
        <div class="llm-question-bar">
          <span id="llm-question-text">Escuchando voz por micrófono...</span>
        </div>
        <p id="llm-text">Cargando respuesta...</p>
      </div>
    </main>
  </div>

  <script src="r1-bridge.js"></script>
  <script src="r1-mock.js"></script>
  <script src="app.js"></script>
</body>
</html>
