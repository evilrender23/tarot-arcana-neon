<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1427"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="94" fill="none" stroke="#FE5000" stroke-width="8" stroke-opacity="0.4"/>
  <g transform="translate(100, 100) scale(13)" filter="url(#glow)">
    
            <circle cx="12" cy="12" r="8" stroke="#FE5000" stroke-width="2" fill="none"/>
            <polygon points="10 8 16 12 10 16 10 8" fill="#FE5000"/>
        
  </g>
</svg>